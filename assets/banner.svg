<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>

    <!-- Accent Glow Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .title {
      font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 54px;
      fill: url(#text-grad);
    }
    .subtitle {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      font-size: 20px;
      fill: #94a3b8;
      letter-spacing: 1.5px;
    }
    .tagline {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      font-size: 16px;
      fill: #38bdf8;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .hand-drawn-line {
      fill: none;
      stroke: url(#accent-grad);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1000;
      stroke-dashoffset: 0;
    }
    .grid-pattern {
      fill: none;
      stroke: #334155;
      stroke-width: 0.5;
      opacity: 0.3;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" rx="16" />

  <!-- Subtle Blueprint/Whiteboard Grid -->
  <g class="grid-pattern">
    <path d="M 0,40 L 1200,40 M 0,80 L 1200,80 M 0,120 L 1200,120 M 0,160 L 1200,160 M 0,200 L 1200,200 M 0,240 L 1200,240 M 0,280 L 1200,280 M 0,320 L 1200,320 M 0,360 L 1200,360" />
    <path d="M 80,0 L 80,400 M 160,0 L 160,400 M 240,0 L 240,400 M 320,0 L 320,400 M 400,0 L 400,400 M 480,0 L 480,400 M 560,0 L 560,400 M 640,0 L 640,400 M 720,0 L 720,400 M 800,0 L 800,400 M 880,0 L 880,400 M 960,0 L 960,400 M 1040,0 L 1040,400 M 1120,0 L 1120,400" />
  </g>

  <!-- Decorative hand-drawn whiteboard style background paths -->
  <path class="hand-drawn-line" d="M 50,350 Q 300,370 600,350 T 1150,350" />
  <path class="hand-drawn-line" d="M 950,80 C 1050,100 1100,200 1000,280 C 920,340 850,220 950,80 Z" opacity="0.6" filter="url(#glow)" stroke-width="2" />
  <path class="hand-drawn-line" d="M 100,80 L 150,130 M 150,80 L 100,130" opacity="0.4" stroke-width="3" />
  <circle cx="1050" cy="120" r="15" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="5,5" />

  <!-- Brain/AI Node Illustration (Hand-drawn Whiteboard style) -->
  <g transform="translate(100, 180)" stroke="url(#accent-grad)" stroke-width="3" fill="none" opacity="0.8">
    <path d="M 0,0 Q 20,-30 50,-10 T 100,-20 T 120,30 T 70,60 T 20,40 Z" />
    <path d="M 120,30 Q 150,50 180,20" />
    <circle cx="180" cy="20" r="8" fill="#a855f7" />
    <path d="M 50,-10 Q 60,-50 90,-60" />
    <circle cx="90" cy="-60" r="8" fill="#38bdf8" />
  </g>

  <!-- Content Group -->
  <g transform="translate(380, 150)">
    <!-- Tagline -->
    <text class="tagline" x="0" y="0">Ecosystem &amp; Curated List</text>
    
    <!-- Title -->
    <text class="title" x="0" y="65">Whiteboard Animation AI</text>
    <text class="title" x="0" y="125" fill="url(#accent-grad)">Agents &amp; SaaS</text>
    
    <!-- Subtitle -->
    <text class="subtitle" x="0" y="180">Top Automated Drawing, Explainer Video &amp; Sketch Systems</text>
  </g>
</svg>
